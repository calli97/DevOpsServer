  - name: General
    description: Endpoints generales
  - name: Projects
    description: Gestión de proyectos (repositorios git)
  - name: Project Instances
    description: Instancias de un proyecto (branch + servidor de destino)
  - name: Deploys
    description: Procesos PM2 que corren dentro de una instancia
  - name: Config Files
    description: Archivos de configuración (ej .env) escritos en cada deploy
  - name: Nginx Configs
    description: Configuraciones nginx asociadas a instancias
  - name: Slave Servers
    description: Servidores remotos donde corren las instancias
  - name: GitHub
    description: Integración con webhooks de GitHub para auto-deploy
